<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>earfultime Friendship Application</title>

<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans&family=Playpen+Sans&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
:root{
  --blue:#7bbcf7;
  --brown:#53371e;
  --cream:#fefaf9;
  --soft:#9fbccc;
  --line:#e7ded6;
}

*{box-sizing:border-box}

html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  font-family:'Josefin Sans';
  background:var(--soft);
}

/* SLIDE BASE */
.slide{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:16px;
}

/* FORM */
#formSlide{
  display:flex;
}

.form-box{
  width:100%;
  max-width:520px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

/* INPUT */
input,textarea{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid var(--line);
  font-size:14px;
}

textarea{height:70px}

/* STATUS */
.status-group{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
}

.status-item{
  padding:8px;
  border-radius:999px;
  text-align:center;
  cursor:pointer;
  border:1px solid rgba(83,55,30,.2);
  font-size:12px;
}

.status-item.active{
  background:var(--brown);
  color:#fff;
}

/* BUTTON */
.actions{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.btn{
  flex:1;
  padding:12px;
  border:none;
  border-radius:12px;
  cursor:pointer;
}

.btn-primary{background:var(--blue);color:white}
.btn-secondary{background:#ddd}

/* PREVIEW */
#previewSlide{
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

/* FRAME AUTO FIT */
.frame{
  width:min(92vw, 92vh);
  aspect-ratio:1/1;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* CARD */
.canvas{
  width:100%;
  height:100%;
  background:var(--cream);
  border-radius:24px;
  padding:20px;
  box-shadow:0 15px 30px rgba(0,0,0,.15);
  display:flex;
  flex-direction:column;
}

/* TITLE */
.title{
  text-align:center;
  font-family:'Playpen Sans';
  color:var(--brown);
  font-size:22px;
  margin-bottom:12px;
}

/* GRID */
.layout{
  display:grid;
  grid-template-columns:160px 1fr;
  gap:12px;
}

/* PHOTO */
.photo{
  width:100%;
  aspect-ratio:3/4;
  border-radius:12px;
  border:2px dashed var(--brown);
  overflow:hidden;
}

.photo img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* FIELD */
.field{
  border-bottom:1px solid var(--line);
  padding:4px;
  font-size:12px;
}

.row{display:flex;gap:8px}

/* SECTION */
.section{margin-top:10px}

.section-title{
  font-size:11px;
  background:var(--brown);
  color:white;
  padding:4px 10px;
  border-radius:10px;
  display:inline-block;
  margin-bottom:4px;
}

/* STATUS BADGE */
.status-badge{
  padding:3px 10px;
  border-radius:999px;
  background:var(--brown);
  color:#fff;
  font-size:11px;
}

/* BUTTON PREVIEW */
.preview-actions{
  width:min(92vw,92vh);
  margin-top:10px;
  display:flex;
  gap:10px;
}
</style>
</head>

<body>

<!-- FORM -->
<div id="formSlide" class="slide">
  <div class="form-box">

    <input type="file" id="photoInput">
    <input id="name" placeholder="Name">
    <input id="age" placeholder="Age">
    <input id="pronouns" placeholder="Pronouns">
    <input id="mbti" placeholder="MBTI">
    <input id="dob" placeholder="Date of Birth">
    <input id="pob" placeholder="Place of Birth">
    <textarea id="hobbies" placeholder="Hobbies"></textarea>
    <textarea id="about" placeholder="About You"></textarea>

    <div class="status-group">
      <div class="status-item">Single</div>
      <div class="status-item">Taken</div>
      <div class="status-item">Married</div>
      <div class="status-item">Engaged</div>
      <div class="status-item">Non committal</div>
      <div class="status-item">earfultimecommittal</div>
    </div>

    <div class="actions">
      <button class="btn btn-primary" onclick="next()">Preview</button>
    </div>

  </div>
</div>

<!-- PREVIEW -->
<div id="previewSlide" class="slide">

<div class="frame" id="frame">
<div class="canvas">

<div class="title">earfultime Friendship Application</div>

<div class="layout">
<div class="photo" id="photoBox"></div>

<div>
<div class="field">Name: <span id="vName"></span></div>

<div class="row">
<div class="field">Age: <span id="vAge"></span></div>
<div class="field">MBTI: <span id="vMbti"></span></div>
</div>

<div class="field">Pronouns: <span id="vPronouns"></span></div>
<div class="field">DOB: <span id="vDob"></span></div>
<div class="field">POB: <span id="vPob"></span></div>

<div class="field">
Status: <span id="vStatus" class="status-badge"></span>
</div>
</div>
</div>

<div class="section">
<div class="section-title">Hobbies</div>
<div class="field" id="vHobbies"></div>
</div>

<div class="section">
<div class="section-title">About You</div>
<div class="field" id="vAbout"></div>
</div>

</div>
</div>

<div class="preview-actions">
<button class="btn btn-secondary" onclick="back()">Back</button>
<button class="btn btn-primary" onclick="download()">Download</button>
</div>

</div>

<script>
let imgData="";
let selectedStatus="";

document.querySelectorAll('.status-item').forEach(item=>{
  item.onclick=()=>{
    document.querySelectorAll('.status-item').forEach(i=>i.classList.remove('active'));
    item.classList.add('active');
    selectedStatus=item.innerText;
  }
});

photoInput.onchange=e=>{
  const file=e.target.files[0];
  const reader=new FileReader();
  reader.onload=()=>imgData=reader.result;
  if(file) reader.readAsDataURL(file);
};

function next(){
  formSlide.style.display="none";
  previewSlide.style.display="flex";

  photoBox.innerHTML = imgData ? `<img src="${imgData}">` : '';

  vName.innerText=name.value;
  vAge.innerText=age.value;
  vMbti.innerText=mbti.value;
  vPronouns.innerText=pronouns.value;
  vDob.innerText=dob.value;
  vPob.innerText=pob.value;
  vHobbies.innerText=hobbies.value;
  vAbout.innerText=about.value;
  vStatus.innerText=selectedStatus;
}

function back(){
  previewSlide.style.display="none";
  formSlide.style.display="flex";
}

function download(){
  const frame = document.getElementById('frame');

  html2canvas(frame,{
    scale:2,
    backgroundColor:"#9fbccc",
    useCORS:true
  }).then(canvas=>{
    const link=document.createElement('a');
    link.download='earfultime.png';
    link.href=canvas.toDataURL("image/png");
    link.click();
  });
}
</script>

</body>
</html>
