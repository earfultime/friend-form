<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EarfulTime - Card Maker</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@400;700&family=Playpen+Sans:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --et-blue: #42a5fd;
            --et-brown: #53371e;
            --et-cream: #fefaf9;
        }
        body { font-family: 'Josefin Sans', sans-serif; background-color: var(--et-cream); color: var(--et-brown); margin: 0; }
        .font-playpen { font-family: 'Playpen Sans', cursive; }
        
        /* Frame Shape Fix */
        .profile-shape {
            border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
            overflow: hidden;
            border: 2px solid var(--et-brown);
            position: relative;
        }
        .profile-shape img { width: 100%; height: 100%; object-fit: cover; }

        /* Preview Scaling Fix */
        #preview-wrapper {
            transform-origin: top center;
            width: 500px;
        }
        
        .preview-container {
            width: 100%;
            display: flex;
            justify-content: center;
            overflow: visible;
        }

        input, textarea { border: 1px solid #e5e7eb; outline: none; }
        input:focus, textarea:focus { border-color: var(--et-blue); }
    </style>
</head>
<body class="min-h-screen pb-20">

    <!-- Header -->
    <header class="bg-white/95 backdrop-blur-md border-b border-gray-100 sticky top-0 z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="https://cdn.phototourl.com/free/2026-04-12-8389dc33-1419-4843-b80b-185eed43e880.png" class="h-8 sm:h-10" alt="Logo">
                <div>
                    <h1 class="text-xl sm:text-2xl font-black text-[#42a5fd] tracking-tighter leading-none">EarfulTime</h1>
                    <p class="text-[10px] uppercase tracking-[0.3em] opacity-40 font-bold">Card Maker</p>
                </div>
            </div>
            <button onclick="downloadCard()" class="bg-[#42a5fd] text-white px-6 py-2.5 rounded-full text-sm font-bold shadow-lg hover:scale-105 active:scale-95 transition-all flex items-center gap-2">
                <i data-lucide="download" class="w-4 h-4"></i> Download
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-8 mt-10 grid grid-cols-1 lg:grid-cols-2 gap-12 items-start">
        
        <!-- FORM SECTION (ORDER 1: Always on top for mobile) -->
        <div class="space-y-8 bg-white p-8 rounded-[2rem] shadow-xl border border-gray-50 order-1">
            <section>
                <h3 class="text-xl font-black flex items-center gap-2 mb-6 text-[#42a5fd]">
                    <i data-lucide="user" class="w-6 h-6"></i> Identity
                </h3>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <input type="text" id="username" placeholder="Username" oninput="updatePreview()" class="w-full p-3 rounded-xl bg-gray-50">
                    <input type="text" id="displayName" placeholder="Display Name" oninput="updatePreview()" class="w-full p-3 rounded-xl bg-gray-50">
                    <input type="text" id="age" placeholder="Age" oninput="updatePreview()" class="w-full p-3 rounded-xl bg-gray-50">
                    <input type="text" id="pob" placeholder="Place of Birth" oninput="updatePreview()" class="w-full p-3 rounded-xl bg-gray-50">
                    <div class="col-span-1 sm:col-span-2">
                        <label class="text-[10px] font-bold opacity-40 uppercase ml-1">Date of Birth</label>
                        <input type="date" id="dob" oninput="updatePreview()" class="w-full p-3 rounded-xl bg-gray-50">
                    </div>
                </div>
                <div class="mt-6">
                    <label class="text-[10px] font-bold text-[#42a5fd] uppercase block mb-2">Profile Photo</label>
                    <input type="file" onchange="handleImage(event, 'profile-img')" class="text-xs w-full">
                </div>
            </section>

            <section>
                <h3 class="text-xl font-black flex items-center gap-2 mb-4 text-[#42a5fd]">
                    <i data-lucide="heart" class="w-6 h-6"></i> Love Interest
                </h3>
                <div class="flex flex-wrap gap-2" id="status-options"></div>
            </section>

            <section>
                <h3 class="text-xl font-black flex items-center gap-2 mb-4 text-[#42a5fd]">
                    <i data-lucide="sparkles" class="w-6 h-6"></i> Interests & Singers
                </h3>
                <div class="space-y-4">
                    <input type="text" id="interests-input" placeholder="Interests (comma separated)" oninput="updateList('interests')" class="w-full p-3 rounded-xl bg-gray-50">
                    <input type="text" id="singers-input" placeholder="Favorite Singers (comma separated)" oninput="updateList('singers')" class="w-full p-3 rounded-xl bg-gray-50">
                </div>
            </section>

            <section>
                <h3 class="text-xl font-black flex items-center gap-2 mb-4 text-[#42a5fd]">
                    <i data-lucide="image" class="w-6 h-6"></i> Gallery (4 Photos)
                </h3>
                <div class="grid grid-cols-2 gap-4">
                    <input type="file" onchange="handleImage(event, 'g1')" class="text-[10px]">
                    <input type="file" onchange="handleImage(event, 'g2')" class="text-[10px]">
                    <input type="file" onchange="handleImage(event, 'g3')" class="text-[10px]">
                    <input type="file" onchange="handleImage(event, 'g4')" class="text-[10px]">
                </div>
            </section>

            <section>
                <h3 class="text-xl font-black flex items-center gap-2 mb-4 text-[#42a5fd]">
                    <i data-lucide="quote" class="w-6 h-6"></i> About Me
                </h3>
                <textarea id="aboutMe" placeholder="Write something..." oninput="updatePreview()" class="w-full p-4 rounded-2xl h-32 bg-gray-50 resize-none font-playpen"></textarea>
            </section>
        </div>

        <!-- PREVIEW SECTION (ORDER 2: Always at the bottom for mobile) -->
        <div class="flex flex-col items-center order-2">
            <div class="lg:sticky lg:top-32 w-full">
                <div class="flex items-center justify-center gap-2 mb-8">
                    <i data-lucide="sparkles" class="text-[#cfb59e] w-6 h-6"></i>
                    <h2 class="text-3xl font-black tracking-tight">Live Preview</h2>
                </div>
                
                <div class="preview-container">
                    <div id="preview-wrapper">
                        <!-- THE CARD -->
                        <div id="capture-area" class="w-[500px] min-h-[800px] bg-[#fdfdfd] p-10 relative shadow-2xl overflow-hidden text-[#53371e] flex flex-col">
                            <!-- Blobs -->
                            <div class="absolute top-[-50px] left-[-50px] w-64 h-64 bg-[#bad9eb]/30 rounded-full blur-3xl"></div>
                            <div class="absolute bottom-[-50px] right-[-50px] w-80 h-80 bg-[#cfb59e]/30 rounded-full blur-3xl"></div>

                            <!-- Header -->
                            <div class="relative z-10 flex justify-between items-start mb-8">
                                <div>
                                    <div id="v-username" class="bg-[#42a5fd] text-white px-5 py-1.5 rounded-full text-xs font-bold w-fit rotate-[-2deg] shadow-lg">@earfultime</div>
                                    <h1 class="text-5xl font-black tracking-tighter mt-3 leading-tight">HEY, IT'S <span id="v-displayName" class="text-[#42a5fd] underline decoration-wavy decoration-[#cfb59e]/50">earfultime</span></h1>
                                </div>
                                <div class="w-20 h-20 bg-white border-2 border-[#53371e] rounded-2xl flex items-center justify-center rotate-3 shadow-xl overflow-hidden shrink-0">
                                    <img src="https://cdn.phototourl.com/free/2026-04-12-8389dc33-1419-4843-b80b-185eed43e880.png" class="w-full h-full object-contain p-1">
                                </div>
                            </div>

                            <!-- Main Content -->
                            <div class="grid grid-cols-12 gap-6 relative z-10 mb-8">
                                <div class="col-span-5">
                                    <div class="w-full aspect-square profile-shape shadow-2xl rotate-[-3deg] bg-gray-50">
                                        <img id="v-profile-img" src="" class="hidden">
                                        <div id="profile-placeholder" class="w-full h-full flex items-center justify-center text-gray-200"><i data-lucide="user" class="w-16 h-16"></i></div>
                                    </div>
                                </div>
                                <div class="col-span-7 flex flex-col gap-4">
                                    <div class="bg-white p-5 border-2 border-[#53371e] rounded-[2rem] shadow-sm min-h-[140px] relative overflow-hidden">
                                        <p id="v-aboutMe" class="text-xs leading-relaxed font-playpen break-words">Tell us about yourself...</p>
                                        <i data-lucide="quote" class="absolute -top-2 -right-2 text-[#42a5fd] opacity-10 w-12 h-12"></i>
                                    </div>
                                    <div class="grid grid-cols-2 gap-3 text-[10px] font-bold">
                                        <div class="bg-[#bad9eb]/20 p-2.5 rounded-xl border border-[#53371e]/10 flex items-center gap-2">
                                            <i data-lucide="calendar" class="w-3.5 h-3.5 text-[#42a5fd]"></i> Age: <span id="v-age">-</span>
                                        </div>
                                        <div class="bg-[#bad9eb]/20 p-2.5 rounded-xl border border-[#53371e]/10 flex items-center gap-2">
                                            <i data-lucide="map-pin" class="w-3.5 h-3.5 text-[#42a5fd]"></i> POB: <span id="v-pob">-</span>
                                        </div>
                                    </div>
                                    <div class="bg-[#bad9eb]/20 p-2.5 rounded-xl border border-[#53371e]/10 text-[10px] font-bold flex items-center gap-2">
                                        <i data-lucide="gift" class="w-3.5 h-3.5 text-[#42a5fd]"></i> DOB: <span id="v-dob">-</span>
                                    </div>
                                </div>
                            </div>

                            <!-- Status Bar -->
                            <div class="bg-[#53371e] text-white py-2.5 px-8 rounded-full flex justify-between items-center shadow-xl rotate-[1deg] relative z-10 mb-8">
                                <span class="text-xs font-black tracking-widest uppercase">Love Interest</span>
                                <span id="v-status" class="bg-white text-[#53371e] px-5 py-1 rounded-full text-[10px] font-bold">Single</span>
                            </div>

                            <!-- Interests & Singers -->
                            <div class="grid grid-cols-12 gap-6 relative z-10 mb-8 flex-grow">
                                <div class="col-span-7 space-y-4">
                                    <div class="bg-[#bad9eb]/20 p-4 border-2 border-[#53371e] rounded-[2rem]">
                                        <h3 class="text-[11px] font-black mb-2 uppercase flex items-center gap-1.5"><i data-lucide="sparkles" class="w-3.5 h-3.5 text-[#42a5fd]"></i> Interests</h3>
                                        <div id="v-interests" class="flex flex-wrap gap-1.5"></div>
                                    </div>
                                    <div class="bg-[#cfb59e]/20 p-4 border-2 border-[#53371e] rounded-[2rem]">
                                        <h3 class="text-[11px] font-black mb-2 uppercase flex items-center gap-1.5"><i data-lucide="music-2" class="w-3.5 h-3.5 text-[#cfb59e]"></i> Singers</h3>
                                        <div id="v-singers" class="flex flex-wrap gap-1.5"></div>
                                    </div>
                                </div>
                                <div class="col-span-5">
                                    <div class="w-full aspect-[4/5] bg-white p-2 border-2 border-[#53371e] rounded-3xl shadow-xl rotate-3 overflow-hidden">
                                        <img id="v-g1" src="" class="w-full h-full object-cover rounded-2xl hidden">
                                    </div>
                                </div>
                            </div>

                            <!-- Bottom Gallery -->
                            <div class="flex gap-4 relative z-10 items-end mt-auto">
                                <div class="flex-1 flex gap-3">
                                    <div class="flex-1 aspect-square bg-white p-1.5 border-2 border-[#53371e] rounded-2xl -rotate-6 shadow-md overflow-hidden"><img id="v-g2" src="" class="w-full h-full object-cover rounded-xl hidden"></div>
                                    <div class="flex-1 aspect-square bg-white p-1.5 border-2 border-[#53371e] rounded-2xl rotate-3 shadow-md overflow-hidden"><img id="v-g3" src="" class="w-full h-full object-cover rounded-xl hidden"></div>
                                    <div class="flex-1 aspect-square bg-white p-1.5 border-2 border-[#53371e] rounded-2xl -rotate-3 shadow-md overflow-hidden"><img id="v-g4" src="" class="w-full h-full object-cover rounded-xl hidden"></div>
                                </div>
                                <div class="flex flex-col items-end gap-3">
                                    <div class="flex gap-2">
                                        <div class="w-8 h-8 bg-[#42a5fd] rounded-full flex items-center justify-center text-white shadow-lg"><i data-lucide="globe" class="w-4 h-4"></i></div>
                                        <div class="w-8 h-8 bg-[#cfb59e] rounded-full flex items-center justify-center text-white shadow-lg"><i data-lucide="globe" class="w-4 h-4"></i></div>
                                    </div>
                                    <div class="bg-[#53371e] text-white px-5 py-2 rounded-full text-[10px] font-black tracking-widest shadow-lg">FRIENDS +</div>
                                </div>
                            </div>

                            <!-- Branding -->
                            <div class="relative mt-8 flex items-center gap-5 z-10">
                                <img src="https://cdn.phototourl.com/free/2026-04-12-8389dc33-1419-4843-b80b-185eed43e880.png" class="h-20 object-contain">
                                <div>
                                    <p class="text-2xl font-black uppercase text-[#42a5fd] tracking-tighter leading-none">EarfulTime</p>
                                    <p class="text-[10px] font-bold uppercase opacity-40">Friendship Card Maker</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const STATUS_OPTIONS = ['Single', 'Taken', 'Married', 'Engaged', 'Non-committal', 'HTS', 'earfultimecommittal'];
        let currentStatus = 'Single';

        lucide.createIcons();

        const statusContainer = document.getElementById('status-options');
        STATUS_OPTIONS.forEach(status => {
            const btn = document.createElement('button');
            btn.innerText = status;
            btn.className = `px-4 py-2 rounded-full text-xs font-bold border transition-all ${status === currentStatus ? 'bg-[#42a5fd] text-white border-[#42a5fd] shadow-md' : 'bg-gray-50 text-[#53371e] border-gray-200'}`;
            btn.onclick = () => {
                currentStatus = status;
                document.querySelectorAll('#status-options button').forEach(b => {
                    b.className = 'px-4 py-2 rounded-full text-xs font-bold border transition-all bg-gray-50 text-[#53371e] border-gray-200';
                });
                btn.className = 'px-4 py-2 rounded-full text-xs font-bold border transition-all bg-[#42a5fd] text-white border-[#42a5fd] shadow-md';
                updatePreview();
            };
            statusContainer.appendChild(btn);
        });

        function handleImage(event, targetId) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.getElementById('v-' + targetId);
                    img.src = e.target.result;
                    img.classList.remove('hidden');
                    if (targetId === 'profile-img') document.getElementById('profile-placeholder').classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        }

        function updateList(type) {
            const val = document.getElementById(type + '-input').value;
            const container = document.getElementById('v-' + type);
            container.innerHTML = '';
            val.split(',').forEach(item => {
                if (item.trim()) {
                    const span = document.createElement('span');
                    span.className = 'text-[9px] bg-white px-2 py-0.5 rounded-full border border-[#53371e]/10 font-bold shadow-sm';
                    span.innerText = item.trim();
                    container.appendChild(span);
                }
            });
        }

        function updatePreview() {
            const fields = ['username', 'displayName', 'age', 'pob', 'dob', 'aboutMe'];
            fields.forEach(f => {
                const val = document.getElementById(f).value;
                const target = document.getElementById('v-' + f);
                if (f === 'username') target.innerText = val ? '@' + val : '@earfultime';
                else if (f === 'displayName') target.innerText = val || 'earfultime';
                else target.innerText = val || '-';
            });
            document.getElementById('v-status').innerText = currentStatus;
        }

        function downloadCard() {
            const node = document.getElementById('capture-area');
            htmlToImage.toPng(node, { pixelRatio: 3, backgroundColor: '#fdfdfd' })
                .then(dataUrl => {
                    const link = document.createElement('a');
                    link.download = 'earfultime-card.png';
                    link.href = dataUrl;
                    link.click();
                });
        }

        function scalePreview() {
            const wrapper = document.getElementById('preview-wrapper');
            const container = wrapper.parentElement;
            const containerWidth = container.offsetWidth;
            const cardWidth = 500;
            const scale = Math.min(1, containerWidth / cardWidth);
            
            wrapper.style.transform = `scale(${scale})`;
            container.style.height = (document.getElementById('capture-area').offsetHeight * scale) + 'px';
        }
        window.onresize = scalePreview;
        window.onload = scalePreview;
        setInterval(scalePreview, 1000);
    </script>
</body>
</html>
