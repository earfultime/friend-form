<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EarfulTime - Friendship CV</title>
    
    <!-- Fonts & Libraries -->
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@400;700;900&family=Playpen+Sans:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Josefin Sans', 'sans-serif'],
                        playpen: ['Playpen Sans', 'cursive'],
                    },
                    colors: {
                        'et-blue': '#42a5fd',
                        'et-brown': '#53371e',
                        'et-cream': '#fefaf9',
                    }
                }
            }
        }
    </script>

    <style>
        [x-cloak] { display: none !important; }
        .profile-shape {
            border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
            overflow: hidden;
            border: 4px solid #53371e;
        }
        #preview-wrapper {
            transform-origin: top center;
            width: 500px; /* Lebar tetap untuk hasil download */
        }
        /* Memastikan font terbaca saat capture */
        #capture-area * {
            -webkit-font-smoothing: antialiased;
        }
    </style>
</head>
<body class="bg-et-cream text-et-brown min-h-screen font-sans" x-data="cardApp()" x-init="init()">

    <!-- Header -->
    <header class="bg-white/95 backdrop-blur-md border-b border-gray-100 sticky top-0 z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-white border border-gray-100 rounded-xl flex items-center justify-center overflow-hidden shadow-sm">
                    <img :src="images.logo || proxyLogo" class="w-full h-full object-contain p-1" crossorigin="anonymous">
                </div>
                <div>
                    <h1 class="text-xl sm:text-2xl font-black text-et-blue tracking-tighter leading-none">EarfulTime</h1>
                    <p class="text-[10px] uppercase tracking-[0.3em] opacity-40 font-bold">Card Maker</p>
                </div>
            </div>
            
            <div class="flex gap-3" x-show="step === 'preview'" x-cloak>
                <button @click="step = 'form'" class="bg-gray-100 text-et-brown px-4 py-2 rounded-full text-xs font-bold hover:bg-gray-200 transition-all flex items-center gap-2">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i> Back
                </button>
                <button @click="downloadPNG()" :disabled="isDownloading" class="bg-et-blue text-white px-4 py-2 rounded-full text-xs font-bold shadow-lg hover:scale-105 transition-all flex items-center gap-2 disabled:opacity-50">
                    <i data-lucide="download" class="w-4 h-4" x-show="!isDownloading"></i>
                    <span x-text="isDownloading ? 'Processing...' : 'Download PNG'"></span>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 mt-10 pb-20">
        
        <!-- SLIDE 1: FORM INPUT -->
        <div x-show="step === 'form'" x-transition class="max-w-2xl mx-auto space-y-8 bg-white p-6 sm:p-8 rounded-[2.5rem] shadow-2xl border border-gray-50">
            <div class="text-center">
                <h2 class="text-3xl sm:text-4xl font-black text-et-brown">Create Your Card</h2>
                <p class="text-gray-400 text-sm mt-2">Isi data dirimu untuk membuat CV pertemanan yang unik</p>
            </div>

            <div class="space-y-4">
                <h3 class="font-black text-et-blue uppercase text-sm flex items-center gap-2"><i data-lucide="user" class="w-4 h-4"></i> Identity</h3>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <input type="text" x-model="formData.username" placeholder="Username (@...)" class="w-full p-4 rounded-2xl bg-gray-50 border-2 border-transparent focus:border-et-blue outline-none">
                    <input type="text" x-model="formData.displayName" placeholder="Nama Display" class="w-full p-4 rounded-2xl bg-gray-50 border-2 border-transparent focus:border-et-blue outline-none">
                    <div class="col-span-1 sm:col-span-2">
                        <label class="text-[10px] font-bold opacity-40 uppercase ml-1">Tanggal Lahir</label>
                        <input type="date" x-model="formData.dob" @change="updateAge()" class="w-full p-4 rounded-2xl bg-gray-50 border-2 border-transparent focus:border-et-blue outline-none">
                    </div>
                    <input type="text" x-model="formData.age" placeholder="Umur" class="w-full p-4 rounded-2xl bg-gray-50 border-2 border-transparent focus:border-et-blue outline-none">
                    <input type="text" x-model="formData.pob" placeholder="Tempat Lahir" class="w-full p-4 rounded-2xl bg-gray-50 border-2 border-transparent focus:border-et-blue outline-none">
                </div>
            </div>

            <div class="space-y-4">
                <h3 class="font-black text-et-blue uppercase text-sm flex items-center gap-2"><i data-lucide="image" class="w-4 h-4"></i> Photos</h3>
                <div class="grid grid-cols-2 sm:grid-cols-3 gap-4">
                    <div class="space-y-1"><label class="text-[9px] font-bold opacity-50">PROFILE</label><input type="file" @change="uploadImg($event, 'profile')" class="text-[10px] w-full"></div>
                    <div class="space-y-1"><label class="text-[9px] font-bold opacity-50">GALLERY 1</label><input type="file" @change="uploadImg($event, 'g1')" class="text-[10px] w-full"></div>
                    <div class="space-y-1"><label class="text-[9px] font-bold opacity-50">LOGO BARU</label><input type="file" @change="uploadImg($event, 'logo')" class="text-[10px] w-full"></div>
                </div>
            </div>

            <div class="space-y-4">
                <h3 class="font-black text-et-blue uppercase text-sm flex items-center gap-2"><i data-lucide="heart" class="w-4 h-4"></i> Love Interest</h3>
                <div class="flex flex-wrap gap-2">
                    <template x-for="opt in statusOptions">
                        <button @click="status = opt" :class="status === opt ? 'bg-et-blue text-white shadow-md scale-105' : 'bg-gray-100 text-et-brown'" class="px-4 py-2 rounded-full text-xs font-bold transition-all" x-text="opt"></button>
                    </template>
                </div>
            </div>

            <div class="space-y-4">
                <h3 class="font-black text-et-blue uppercase text-sm flex items-center gap-2"><i data-lucide="sparkles" class="w-4 h-4"></i> Interests</h3>
                <input type="text" x-model="formData.interests" placeholder="Hobi (pisahkan dengan koma)" class="w-full p-4 rounded-2xl bg-gray-50 border-2 border-transparent focus:border-et-blue outline-none">
                <input type="text" x-model="formData.singers" placeholder="Penyanyi Favorit (pisahkan dengan koma)" class="w-full p-4 rounded-2xl bg-gray-50 border-2 border-transparent focus:border-et-blue outline-none">
            </div>

            <textarea x-model="formData.aboutMe" placeholder="Tentang saya..." class="w-full p-5 rounded-[2rem] h-32 bg-gray-50 font-playpen border-2 border-transparent focus:border-et-blue outline-none text-sm"></textarea>

            <button @click="step = 'preview'; $nextTick(() => { lucide.createIcons(); handleResize(); })" class="w-full bg-et-blue text-white py-5 rounded-[2rem] font-black text-xl shadow-xl hover:scale-[1.02] transition-all">
                Generate Preview
            </button>
        </div>

        <!-- SLIDE 2: PREVIEW -->
        <div x-show="step === 'preview'" x-cloak class="flex flex-col items-center">
            <div class="flex items-center justify-center gap-3 mb-8">
                <i data-lucide="sparkles" class="text-[#cfb59e] w-8 h-8"></i>
                <h2 class="text-3xl font-black text-et-brown">Your Card is Ready!</h2>
            </div>

            <div class="w-full flex justify-center overflow-visible">
                <div id="preview-wrapper" :style="`transform: scale(${scale}); height: ${850 * scale}px`" class="transition-transform duration-300">
                    <!-- THE CARD (Fixed 500x850 for Download) -->
                    <div id="capture-area" class="w-[500px] h-[850px] bg-white p-10 relative shadow-2xl overflow-hidden text-et-brown flex flex-col rounded-[3rem] border border-gray-50">
                        
                        <!-- Blobs -->
                        <div class="absolute top-[-80px] left-[-80px] w-80 h-80 bg-et-blue/10 rounded-full blur-[80px]"></div>
                        <div class="absolute bottom-[-80px] right-[-80px] w-96 h-96 bg-orange-200/10 rounded-full blur-[80px]"></div>

                        <!-- Header -->
                        <div class="relative z-10 flex justify-between items-start mb-10">
                            <div>
                                <div class="bg-et-blue text-white px-6 py-2 rounded-full text-[11px] font-black w-fit rotate-[-2deg] shadow-xl" x-text="'@' + (formData.username || 'user')"></div>
                                <h1 class="text-5xl font-black tracking-tighter mt-5 leading-[0.9]">
                                    HEY, IT'S <br>
                                    <span class="text-et-blue underline decoration-wavy decoration-orange-200 underline-offset-8" x-text="formData.displayName || 'Nama'"></span>
                                </h1>
                            </div>
                            <div class="w-24 h-24 bg-white border-2 border-et-brown rounded-[2rem] flex items-center justify-center rotate-6 shadow-2xl overflow-hidden shrink-0">
                                <img :src="images.logo || proxyLogo" class="w-full h-full object-contain p-2" crossorigin="anonymous">
                            </div>
                        </div>

                        <!-- Main Content -->
                        <div class="grid grid-cols-12 gap-8 relative z-10 mb-10">
                            <div class="col-span-5">
                                <div class="w-full aspect-square profile-shape shadow-2xl rotate-[-4deg] bg-gray-50 flex items-center justify-center border-4 border-white">
                                    <template x-if="images.profile">
                                        <img :src="images.profile" class="w-full h-full object-cover">
                                    </template>
                                    <template x-if="!images.profile">
                                        <i data-lucide="user" class="w-16 h-16 text-gray-200"></i>
                                    </template>
                                </div>
                            </div>
                            <div class="col-span-7 flex flex-col gap-5">
                                <div class="bg-white p-6 border-2 border-et-brown rounded-[2.5rem] shadow-sm min-h-[160px] relative overflow-hidden">
                                    <p class="text-[13px] leading-relaxed font-playpen break-words" x-text="formData.aboutMe || 'Tell us about yourself...'"></p>
                                    <i data-lucide="quote" class="absolute -top-3 -right-3 text-et-blue opacity-10 w-16 h-16"></i>
                                </div>
                                <div class="grid grid-cols-2 gap-4 text-[11px] font-black uppercase">
                                    <div class="bg-et-blue/10 p-3 rounded-2xl border border-et-brown/5 flex items-center gap-2">
                                        <i data-lucide="calendar" class="w-4 h-4 text-et-blue"></i> <span x-text="'Age: ' + (formData.age || '-')"></span>
                                    </div>
                                    <div class="bg-et-blue/10 p-3 rounded-2xl border border-et-brown/5 flex items-center gap-2">
                                        <i data-lucide="map-pin" class="w-4 h-4 text-et-blue"></i> <span x-text="formData.pob || 'POB'"></span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Status Bar -->
                        <div class="bg-et-brown text-white py-3.5 px-10 rounded-full flex justify-between items-center shadow-2xl rotate-[1.5deg] relative z-10 mb-10">
                            <span class="text-[11px] font-black tracking-[0.2em] uppercase">Love Interest</span>
                            <span class="bg-white text-et-brown px-6 py-1.5 rounded-full text-[11px] font-black shadow-inner" x-text="status"></span>
                        </div>

                        <!-- Interests & Singers -->
                        <div class="grid grid-cols-12 gap-8 relative z-10 mb-10 flex-grow">
                            <div class="col-span-7 space-y-5">
                                <div class="bg-et-blue/10 p-5 border-2 border-et-brown rounded-[2.5rem]">
                                    <h3 class="text-[12px] font-black mb-3 uppercase flex items-center gap-2"><i data-lucide="sparkles" class="w-4 h-4 text-et-blue"></i> Interests</h3>
                                    <div class="flex flex-wrap gap-2">
                                        <template x-for="item in formData.interests.split(',')">
                                            <span class="text-[9px] bg-white px-2 py-0.5 rounded-full border border-et-brown/10 font-bold shadow-sm" x-text="item.trim()" x-show="item.trim()"></span>
                                        </template>
                                    </div>
                                </div>
                                <div class="bg-orange-100/30 p-5 border-2 border-et-brown rounded-[2.5rem]">
                                    <h3 class="text-[12px] font-black mb-3 uppercase flex items-center gap-2"><i data-lucide="music-2" class="w-4 h-4 text-orange-300"></i> Singers</h3>
                                    <div class="flex flex-wrap gap-2">
                                        <template x-for="item in formData.singers.split(',')">
                                            <span class="text-[9px] bg-white px-2 py-0.5 rounded-full border border-et-brown/10 font-bold shadow-sm" x-text="item.trim()" x-show="item.trim()"></span>
                                        </template>
                                    </div>
                                </div>
                            </div>
                            <div class="col-span-5">
                                <div class="w-full aspect-[4/5] bg-white p-2.5 border-2 border-et-brown rounded-[2.5rem] shadow-2xl rotate-4 overflow-hidden">
                                    <img :src="images.g1" class="w-full h-full object-cover rounded-[2rem]" x-show="images.g1">
                                    <div class="w-full h-full bg-gray-50 flex items-center justify-center rounded-[2rem]" x-show="!images.g1"><i data-lucide="image" class="text-gray-200"></i></div>
                                </div>
                            </div>
                        </div>

                        <!-- Branding -->
                        <div class="relative mt-auto flex items-center gap-6 z-10 pt-10">
                            <div class="w-20 h-20 bg-white border border-gray-100 rounded-2xl flex items-center justify-center overflow-hidden shadow-sm">
                                <img :src="images.logo || proxyLogo" class="w-full h-full object-contain p-2" crossorigin="anonymous">
                            </div>
                            <div>
                                <p class="text-3xl font-black uppercase text-et-blue tracking-tighter leading-none">EarfulTime</p>
                                <p class="text-[11px] font-bold uppercase opacity-40 tracking-widest mt-1">Where connections begin</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        function cardApp() {
            return {
                step: 'form',
                formData: { username: '', displayName: '', dob: '', age: '', pob: '', aboutMe: '', interests: '', singers: '' },
                images: { profile: '', logo: '', g1: '' },
                status: 'Single',
                statusOptions: ['Single', 'Taken', 'Married', 'Engaged', 'HTS'],
                isDownloading: false,
                proxyLogo: '',
                scale: 1,
                
                init() {
                    const originalLogo = "https://cdn.phototourl.com/free/2026-04-12-8389dc33-1419-4843-b80b-185eed43e880.png";
                    this.proxyLogo = `https://wsrv.nl/?url=${encodeURIComponent(originalLogo)}`;
                    lucide.createIcons();
                    this.convertLogoToBase64();
                    window.addEventListener('resize', () => this.handleResize());
                },

                handleResize() {
                    if (this.step === 'preview') {
                        const containerWidth = window.innerWidth;
                        const cardWidth = 500;
                        const padding = 32;
                        this.scale = Math.min(1, (containerWidth - padding) / cardWidth);
                    }
                },

                async convertLogoToBase64() {
                    try {
                        const res = await fetch(this.proxyLogo);
                        const blob = await res.blob();
                        const reader = new FileReader();
                        reader.onloadend = () => { this.images.logo = reader.result; };
                        reader.readAsDataURL(blob);
                    } catch (e) { console.error("Logo Error:", e); }
                },

                updateAge() {
                    if (!this.formData.dob) return;
                    const birth = new Date(this.formData.dob);
                    const now = new Date();
                    let age = now.getFullYear() - birth.getFullYear();
                    if (now.getMonth() < birth.getMonth() || (now.getMonth() === birth.getMonth() && now.getDate() < birth.getDate())) age--;
                    this.formData.age = age;
                },

                uploadImg(e, key) {
                    const file = e.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = (ev) => { this.images[key] = ev.target.result; };
                    reader.readAsDataURL(file);
                },

                async downloadPNG() {
                    this.isDownloading = true;
                    const node = document.getElementById('capture-area');
                    
                    try {
                        // Tunggu render stabil
                        await new Promise(r => setTimeout(r, 1000));
                        
                        const canvas = await html2canvas(node, {
                            scale: 3, // Kualitas HD
                            useCORS: true,
                            backgroundColor: '#ffffff',
                            logging: false,
                            width: 500,
                            height: 850
                        });

                        const link = document.createElement('a');
                        link.download = `Friendship-CV-${this.formData.displayName || 'User'}.png`;
                        link.href = canvas.toDataURL('image/png');
                        link.click();
                    } catch (e) {
                        console.error(e);
                        alert("Gagal download. Silakan coba screenshot manual.");
                    } finally {
                        this.isDownloading = false;
                    }
                }
            }
        }
    </script>
</body>
</html>
