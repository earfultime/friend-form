<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earfultime CV Template</title>
    
    <!-- Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        :root {
            --earful-blue: #42a5fd;
            --earful-brown: #53371e;
            --earful-bg: #fefaf9;
            --earful-lblue: #bad9eb;
            --earful-tan: #cfb59e;
        }
        
        body {
            /* Menggunakan font system default */
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--earful-bg);
            color: var(--earful-brown);
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        /* Utility classes tetap dipertahankan namun diarahkan ke sans-serif */
        .font-playful { font-family: inherit; font-weight: 800; }
        .cv-shadow { box-shadow: 0 40px 80px -20px rgba(83, 55, 30, 0.25); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--earful-lblue); border-radius: 10px; }
        
        .preview-wrapper {
            display: flex;
            justify-content: center;
            padding: 2rem;
            min-width: fit-content;
        }
        
        .cv-container {
            width: 210mm;
            height: 297mm;
            background: white;
            flex-shrink: 0;
            font-family: ui-sans-serif, system-ui, sans-serif;
        }

        @media (max-width: 1023px) {
            .preview-scale {
                transform: scale(0.35);
                transform-origin: top center;
                margin-bottom: -190mm;
            }
        }
        
        @media (min-width: 1024px) {
            .preview-scale {
                transform: scale(0.75);
                transform-origin: top center;
            }
        }

        @media (min-width: 1440px) {
            .preview-scale {
                transform: scale(0.9);
            }
        }

        .section-box { min-width: max-content; }
        
        #cv-output * {
            font-variant-ligatures: none;
        }
    </style>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        earful: {
                            blue: '#42a5fd', brown: '#53371e', bg: '#fefaf9', lblue: '#bad9eb', tan: '#cfb59e',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        const Icon = ({ name, className }) => {
            const icons = {
                phone: <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l2.18-2.18a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>,
                mail: <><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></>,
                instagram: <><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></>,
                camera: <><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        const App = () => {
            const [data, setData] = useState({
                name: "", photo: null, phone: "", email: "", social: "", address: "",
                birthInfo: "", gender: "", status: "", skills: [], education: [], experience: []
            });

            const fileInputRef = useRef(null);

            const handleImage = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const size = 1200; 
                        canvas.width = size; canvas.height = size;
                        const ctx = canvas.getContext('2d');
                        const min = Math.min(img.width, img.height);
                        ctx.drawImage(img, (img.width-min)/2, (img.height-min)/2, min, min, 0, 0, size, size);
                        setData({ ...data, photo: canvas.toDataURL('image/jpeg', 0.9) });
                    };
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            };

            const downloadHD = async () => {
                const node = document.getElementById('cv-output');
                if (!node) return;
                
                window.confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#42a5fd'] });
                
                await document.fonts.ready;

                try {
                    const dataUrl = await htmlToImage.toPng(node, {
                        pixelRatio: 3, 
                        cacheBust: true,
                    });
                    
                    const link = document.createElement('a');
                    link.download = `CV_EARFUL_${data.name.replace(/\s+/g, '_') || 'USER'}.png`;
                    link.href = dataUrl;
                    link.click();
                } catch (e) {
                    console.error("Download failed", e);
                }
            };

            return (
                <div className="flex flex-col lg:flex-row h-screen overflow-hidden bg-earful-bg">
                    
                    {/* EDITOR SECTION */}
                    <div className="w-full lg:w-[450px] bg-white border-r border-earful-lblue p-6 overflow-y-auto custom-scrollbar z-30 shadow-2xl">
                        <header className="mb-10">
                            <h1 className="font-playful text-4xl font-black text-earful-blue tracking-tighter uppercase">AYO BUAT CV!!</h1>
                            <div className="h-1 w-20 bg-earful-blue rounded-full mt-2"></div>
                        </header>

                        <div className="space-y-8 pb-32">
                            <section>
                                <label className="text-[10px] font-black tracking-widest text-earful-tan uppercase">Foto Profil</label>
                                <div onClick={() => fileInputRef.current?.click()} className="mt-2 w-28 h-28 rounded-[2rem] bg-earful-bg border-4 border-dashed border-earful-lblue flex items-center justify-center cursor-pointer overflow-hidden transform hover:scale-105 transition-all">
                                    {data.photo ? <img src={data.photo} className="w-full h-full object-cover" /> : <Icon name="camera" className="text-earful-lblue w-10 h-10" />}
                                </div>
                                <input type="file" ref={fileInputRef} className="hidden" onChange={handleImage} accept="image/*" />
                            </section>

                            <Input label="Nama Lengkap" value={data.name} ph="GWEH CAKEP" onChange={v => setData({...data, name: v})} />
                            <Input label="Tempat, Tgl Lahir" value={data.birthInfo} ph="MARS, 1 JAN 2077" onChange={v => setData({...data, birthInfo: v})} />
                            <div className="grid grid-cols-2 gap-4">
                                <Input label="Gender" value={data.gender} ph="SETENGAH MATANG" onChange={v => setData({...data, gender: v})} />
                                <Input label="Status" value={data.status} ph="LAGI STRESS" onChange={v => setData({...data, status: v})} />
                            </div>
                            <Input label="Alamat" value={data.address} multiline ph="JL. BUNTU NO. 404" onChange={v => setData({...data, address: v})} />

                            <div className="pt-6 border-t border-dashed border-earful-lblue space-y-4">
                                <h3 className="font-playful font-bold text-earful-blue uppercase">KONTAK</h3>
                                <Input label="No Telepon" value={data.phone} ph="08XX-XXX-XXX-XX" onChange={v => setData({...data, phone: v})} />
                                <Input label="Email" value={data.email} ph="HALO@EARFULTIME.COM" onChange={v => setData({...data, email: v})} />
                                <Input label="Instagram" value={data.social} ph="@EARFULTIME" onChange={v => setData({...data, social: v})} />
                            </div>

                            <ListGroup title="KEAHLIAN" count={data.skills.length} max={10} onAdd={() => setData({...data, skills: [...data.skills, ""]})}>
                                {data.skills.map((s, i) => (
                                    <div key={i} className="flex gap-2">
                                        <input className="flex-1 p-3 bg-earful-bg rounded-xl border border-earful-lblue text-sm outline-none" value={s} onChange={e => {
                                            const n = [...data.skills]; n[i] = e.target.value; setData({...data, skills: n});
                                        }} placeholder="Skill lu apa?" />
                                        <button onClick={() => { const n = [...data.skills]; n.splice(i, 1); setData({...data, skills: n}); }} className="text-red-400 font-bold">×</button>
                                    </div>
                                ))}
                            </ListGroup>

                            <ListGroup title="PENDIDIKAN" count={data.education.length} max={5} onAdd={() => setData({...data, education: [...data.education, {id: Date.now(), y: "", s: ""}]})}>
                                {data.education.map((edu, i) => (
                                    <div key={edu.id} className="p-4 bg-earful-bg rounded-2xl border border-earful-lblue relative">
                                        <input placeholder="Tahun" className="w-full bg-transparent text-[10px] font-black text-earful-tan outline-none mb-1" value={edu.y} onChange={e => {
                                            const n = [...data.education]; n[i].y = e.target.value; setData({...data, education: n});
                                        }} />
                                        <textarea placeholder="Sekolah/Kampus" className="w-full bg-transparent text-sm font-bold text-earful-brown outline-none resize-none h-10" value={edu.s} onChange={e => {
                                            const n = [...data.education]; n[i].s = e.target.value; setData({...data, education: n});
                                        }} />
                                        <button onClick={() => { const n = [...data.education]; n.splice(i, 1); setData({...data, education: n}); }} className="absolute top-2 right-4 text-red-400">×</button>
                                    </div>
                                ))}
                            </ListGroup>

                            <ListGroup title="PENGALAMAN" count={data.experience.length} max={6} onAdd={() => setData({...data, experience: [...data.experience, {id: Date.now(), y: "", c: "", p: ""}]})}>
                                {data.experience.map((exp, i) => (
                                    <div key={exp.id} className="p-4 bg-earful-bg rounded-2xl border border-earful-lblue relative space-y-1">
                                        <input placeholder="Tahun" className="w-full bg-transparent text-[10px] font-black text-earful-tan outline-none" value={exp.y} onChange={e => {
                                            const n = [...data.experience]; n[i].y = e.target.value; setData({...data, experience: n});
                                        }} />
                                        <input placeholder="Perusahaan" className="w-full bg-transparent text-sm font-bold text-earful-blue outline-none" value={exp.c} onChange={e => {
                                            const n = [...data.experience]; n[i].c = e.target.value; setData({...data, experience: n});
                                        }} />
                                        <input placeholder="Jabatan" className="w-full bg-transparent text-xs italic text-earful-brown outline-none" value={exp.p} onChange={e => {
                                            const n = [...data.experience]; n[i].p = e.target.value; setData({...data, experience: n});
                                        }} />
                                        <button onClick={() => { const n = [...data.experience]; n.splice(i, 1); setData({...data, experience: n}); }} className="absolute top-2 right-4 text-red-400">×</button>
                                    </div>
                                ))}
                            </ListGroup>
                        </div>
                    </div>

                    {/* PREVIEW SECTION */}
                    <div className="flex-1 overflow-y-auto overflow-x-hidden p-8 flex flex-col items-center">
                        <button onClick={downloadHD} className="sticky top-0 z-50 mb-10 px-12 py-5 bg-earful-blue text-white font-playful font-black text-xl rounded-full shadow-2xl hover:scale-105 active:scale-95 transition-all uppercase">
                            DOWNLOAD PNG
                        </button>

                        <div className="preview-scale">
                            <div id="cv-output" className="cv-container rounded-[3.5rem] overflow-hidden flex flex-row cv-shadow relative">
                                
                                {/* LEFT BAR */}
                                <div className="w-[38%] bg-earful-blue p-12 flex flex-col items-center text-white">
                                    <div className="w-48 h-48 rounded-[3.2rem] border-4 border-white shadow-2xl overflow-hidden mb-12 transform -rotate-3">
                                        {data.photo ? <img src={data.photo} className="w-full h-full object-cover" /> : <div className="w-full h-full bg-earful-lblue opacity-30"></div>}
                                    </div>

                                    <h1 className={`text-4xl font-playful font-black text-center uppercase tracking-tighter mb-16 leading-none ${!data.name ? 'text-white/20 italic' : 'text-white'}`}>
                                        {data.name || "GWEH CAKEP"}
                                    </h1>

                                    <div className="w-full space-y-8">
                                        <div className="bg-white text-earful-blue py-2 rounded-2xl text-center font-playful font-black tracking-widest text-lg uppercase shadow-inner">KONTAK</div>
                                        <PreviewIcon name="phone" text={data.phone} ph="08XX-XXX-XXX-XX" />
                                        <PreviewIcon name="mail" text={data.email} ph="HALO@EARFULTIME.COM" />
                                        <PreviewIcon name="instagram" text={data.social} ph="@EARFULTIME" />
                                    </div>

                                    <div className="w-full mt-16">
                                        <div className="bg-white text-earful-blue py-2 rounded-2xl text-center font-playful font-black tracking-widest text-lg uppercase shadow-inner mb-8">KEAHLIAN</div>
                                        <div className="space-y-4 px-4 overflow-visible">
                                            {data.skills.length > 0 ? data.skills.map((s, i) => (
                                                <div key={i} className="flex gap-4 items-start font-bold">
                                                    <div className="w-2.5 h-2.5 rounded-full bg-white mt-1 shrink-0"></div>
                                                    <span className="text-base truncate uppercase">{s}</span>
                                                </div>
                                            )) : <div className="text-white/20 italic">BISA TIDUR 10 JAM...</div>}
                                        </div>
                                    </div>
                                    
                                    <div className="mt-auto opacity-10 self-start transform -rotate-6">
                                        <span className="font-playful font-black text-7xl uppercase">Earfultime!</span>
                                    </div>
                                </div>

                                {/* RIGHT SIDE */}
                                <div className="flex-1 p-16 relative bg-white flex flex-col">
                                    <div className="absolute top-10 right-8 w-24 opacity-60">
                                        <img src="https://images.weserv.nl/?url=cdn.phototourl.com/free/2026-04-12-8389dc33-1419-4843-b80b-185eed43e880.png" className="w-full h-auto object-contain" />
                                    </div>

                                    <SectionHeader num="1" title="DATA PRIBADI" />
                                    <div className="pl-16 mb-14 space-y-5">
                                        <DataRow label="NAMA" val={data.name} ph="SI PALING KREATIF" />
                                        <DataRow label="TEMPAT, TGL LAHIR" val={data.birthInfo} ph="MARS, 1 JAN 2077" />
                                        <DataRow label="JENIS KELAMIN" val={data.gender} ph="SETENGAH MATANG" />
                                        <DataRow label="STATUS" val={data.status} ph="LAGI STRESS BANGET" />
                                        <DataRow label="ALAMAT" val={data.address} ph="JL. BUNTU NO. 404" />
                                    </div>

                                    <SectionHeader num="2" title="RIWAYAT PENDIDIKAN" />
                                    <div className="pl-16 mb-14 space-y-8">
                                        {data.education.length > 0 ? data.education.map(edu => (
                                            <div key={edu.id} className="relative">
                                                <div className="absolute -left-8 top-1.5 w-2.5 h-2.5 rounded-full bg-earful-lblue" />
                                                <div className="text-[10px] font-black text-earful-tan uppercase tracking-widest">{edu.y}</div>
                                                <div className="text-xl font-bold text-earful-brown tracking-tight leading-tight uppercase">{edu.s}</div>
                                            </div>
                                        )) : <div className="text-earful-tan/20 italic font-medium">TK Belajar Pingsan (2000 - 2005)</div>}
                                    </div>

                                    <SectionHeader num="3" title="PENGALAMAN KERJA" />
                                    <div className="pl-16 space-y-8">
                                        {data.experience.length > 0 ? data.experience.map(exp => (
                                            <div key={exp.id} className="relative">
                                                <div className="absolute -left-8 top-1.5 w-2.5 h-2.5 rounded-full bg-earful-tan" />
                                                <div className="text-[10px] font-black text-earful-tan uppercase tracking-widest">{exp.y}</div>
                                                <div className="text-xl font-black text-earful-blue tracking-tighter leading-none mb-1 uppercase">{exp.c}</div>
                                                <div className="text-sm italic font-bold text-earful-brown opacity-70">({exp.p})</div>
                                            </div>
                                        )) : <div className="text-earful-tan/20 italic font-medium">PT Hilang Kabar - CEO (2020)</div>}
                                    </div>

                                    <div className="mt-auto flex justify-end">
                                        <div className="w-16 h-1.5 bg-earful-lblue rounded-full opacity-30"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const Input = ({ label, value, onChange, ph, multiline }) => (
            <div className="space-y-1">
                <label className="text-[10px] font-black text-earful-tan uppercase tracking-widest ml-1">{label}</label>
                {multiline ? (
                    <textarea value={value} className="w-full p-3 bg-earful-bg border border-earful-lblue rounded-2xl text-sm outline-none resize-none h-24" onChange={e => onChange(e.target.value)} placeholder={ph} />
                ) : (
                    <input value={value} className="w-full p-3 bg-earful-bg border border-earful-lblue rounded-2xl text-sm outline-none" onChange={e => onChange(e.target.value)} placeholder={ph} />
                )}
            </div>
        );

        const ListGroup = ({ title, count, max, onAdd, children }) => (
            <div className="pt-6 border-t border-dashed border-earful-lblue space-y-4">
                <div className="flex justify-between items-center">
                    <h3 className="font-playful font-bold text-earful-blue italic uppercase">{title} ({count}/{max})</h3>
                    <button disabled={count >= max} onClick={onAdd} className="w-8 h-8 rounded-full bg-earful-blue text-white font-bold flex items-center justify-center disabled:bg-gray-200">+</button>
                </div>
                {children}
            </div>
        );

        const PreviewIcon = ({ name, text, ph }) => (
            <div className="flex items-center gap-5">
                <div className="w-11 h-11 rounded-[1.2rem] bg-white/10 flex items-center justify-center border border-white/5 shrink-0">
                    <Icon name={name} className="w-5 h-5 text-white" />
                </div>
                <span className={`text-base font-bold truncate max-w-[200px] ${!text ? 'text-white/20 italic font-medium' : 'text-white'}`}>{text || ph}</span>
            </div>
        );

        const SectionHeader = ({ num, title }) => (
            <div className="flex items-center gap-5 mb-10 overflow-visible">
                <div className="w-11 h-11 rounded-full bg-earful-blue text-white flex items-center justify-center font-playful font-black text-xl shadow-lg transform -rotate-12 shrink-0">{num}</div>
                <div className="section-box px-8 py-3 bg-earful-blue rounded-r-full rounded-tl-full text-white font-playful font-black text-2xl shadow-xl tracking-tighter uppercase">{title}</div>
            </div>
        );

        const DataRow = ({ label, val, ph }) => (
            <div className="flex flex-col">
                <span className="text-[10px] font-black text-earful-tan uppercase tracking-widest mb-0.5">{label} :</span>
                <span className={`text-2xl font-bold leading-tight uppercase ${!val ? 'text-earful-tan/15 italic font-medium text-xl' : 'text-earful-brown'}`}>{val || ph}</span>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
