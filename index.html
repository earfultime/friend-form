<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EarfulTime Friendship Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@400;700;900&display=swap');
        body { font-family: 'Josefin Sans', sans-serif; background: #f1f5f9; padding: 15px; }
        .canvas-container { width: 100%; max-width: 450px; margin: 0 auto; position: sticky; top: 10px; }
        canvas { width: 100% !important; height: auto !important; border-radius: 24px; background: white; box-shadow: 0 25px 50px rgba(0,0,0,0.1); }
        .input-card { background: white; padding: 20px; border-radius: 24px; }
        label { font-size: 10px; font-weight: 900; color: #94a3b8; display: block; margin-bottom: 4px; }
        input, textarea { border: 2px solid #dee2e6 !important; padding: 10px !important; border-radius: 12px !important; width: 100%; margin-bottom: 10px; }
    </style>
</head>
<body class="flex flex-col lg:flex-row gap-8 justify-center items-start">

    <div class="w-full lg:max-w-md space-y-4">
        <div class="input-card shadow-lg">
            <h2 class="text-2xl font-black text-blue-500 mb-4 uppercase">EarfulTime Card</h2>
            <div class="grid grid-cols-2 gap-3">
                <div class="col-span-2"><label>Username</label><input type="text" id="in-user" placeholder="@username" oninput="draw()"></div>
                <div class="col-span-2"><label>Full Name</label><input type="text" id="in-name" placeholder="Nama Lengkap" oninput="draw()"></div>
                <div><label>City</label><input type="text" id="in-pob" placeholder="Jakarta" oninput="draw()"></div>
                <div><label>Birth Date</label><input type="date" id="in-dob" onchange="calculateAge()"></div>
            </div>
            <label>Bio</label>
            <textarea id="in-bio" maxlength="300" class="h-20" placeholder="ceritakan tentang dirimu" oninput="draw()"></textarea>
            
            <div class="grid grid-cols-2 gap-3 mb-4">
                <button onclick="document.getElementById('f-p').click()" class="bg-blue-50 p-3 rounded-xl font-bold text-[10px] text-blue-600">FOTO UTAMA</button>
                <input type="file" id="f-p" class="hidden" onchange="loadImg(event, 'profile')">
                <button onclick="document.getElementById('f-s').click()" class="bg-blue-50 p-3 rounded-xl font-bold text-[10px] text-blue-600">FOTO SAMPING</button>
                <input type="file" id="f-s" class="hidden" onchange="loadImg(event, 'side')">
            </div>

            <label>Interests (Lagu, makanan, hobi - pisahkan koma)</label>
            <input type="text" id="in-int" placeholder="NIKI, Indomie, Gaming..." oninput="draw()">
            
            <button onclick="download()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black mt-2 shadow-lg">DOWNLOAD PNG</button>
        </div>
    </div>

    <div class="canvas-container">
        <canvas id="cardCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('cardCanvas');
        const ctx = canvas.getContext('2d');
        
        // --- BAGIAN OPTIMALISASI HD ---
        const scale = 3; // Mengalikan resolusi 3x lipat
        const baseWidth = 1000;
        const baseHeight = 1600;
        
        canvas.width = baseWidth * scale;
        canvas.height = baseHeight * scale;
        ctx.scale(scale, scale);
        // ------------------------------

        let imgObj = { profile: null, side: null, logo: null };
        let age = "0";

        const logoImg = new Image();
        logoImg.crossOrigin = "anonymous";
        logoImg.src = "https://images.weserv.nl/?url=cdn.phototourl.com/free/2026-04-12-8389dc33-1419-4843-b80b-185eed43e880.png";
        logoImg.onload = () => { imgObj.logo = logoImg; draw(); };

        function calculateAge() {
            const birth = new Date(document.getElementById('in-dob').value);
            if(isNaN(birth)) return;
            const today = new Date();
            let a = today.getFullYear() - birth.getFullYear();
            if (today.getMonth() < birth.getMonth() || (today.getMonth() === birth.getMonth() && today.getDate() < birth.getDate())) a--;
            age = a; draw();
        }

        function loadImg(e, type) {
            const reader = new FileReader();
            reader.onload = ev => {
                const img = new Image();
                img.onload = () => { imgObj[type] = img; draw(); };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        }

        function drawName(context, text, x, y, maxWidth) {
            let fontSize = text.length > 18 ? 65 : 85;
            context.font = `900 ${fontSize}px 'Josefin Sans'`;
            context.fillStyle = "#3b82f6";
            
            let words = text.split(' ');
            let line = '';
            let currentY = y;
            let startX = 210; 

            for (let n = 0; n < words.length; n++) {
                let testLine = line + words[n] + ' ';
                if (context.measureText(testLine).width > (maxWidth - (startX === 210 ? 140 : 0)) && n > 0) {
                    context.fillText(line, startX, currentY);
                    line = words[n] + ' ';
                    currentY += fontSize + 10;
                    startX = 70; 
                } else { line = testLine; }
            }
            context.fillText(line, startX, currentY);
            return currentY;
        }

        function drawWrappedBio(context, text, x, y, maxWidth) {
            let fontSize = text.length > 120 ? 28 : 32; 
            context.font = `400 ${fontSize}px 'Josefin Sans'`; 
            context.fillStyle = "#475569";
            let words = text.split(' ');
            let line = '';
            let currentY = y;
            for (let n = 0; n < words.length; n++) {
                let testLine = line + words[n] + ' ';
                if (context.measureText(testLine).width > maxWidth && n > 0) {
                    context.fillText(line, x, currentY);
                    line = words[n] + ' ';
                    currentY += fontSize + 10;
                } else { line = testLine; }
            }
            context.fillText(line, x, currentY);
        }

        function drawCover(img, x, y, w, h, r) {
            ctx.save();
            ctx.beginPath(); ctx.roundRect(x, y, w, h, r); ctx.clip();
            if(!img) { ctx.fillStyle = "#f1f5f9"; ctx.fill(); }
            else {
                const rImg = img.width/img.height, rTar = w/h;
                let sw, sh, sx, sy;
                if(rImg > rTar) { sh = img.height; sw = sh*rTar; sx = (img.width-sw)/2; sy = 0; }
                else { sw = img.width; sh = sw/rTar; sx = 0; sy = (img.height-sh)/2; }
                ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
            }
            ctx.restore();
        }

        function draw() {
            // Clear canvas untuk rendering ulang
            ctx.clearRect(0, 0, baseWidth, baseHeight);
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, baseWidth, baseHeight);

            if(imgObj.logo) ctx.drawImage(imgObj.logo, 750, 60, 200, 200);

            // USERNAME
            const user = document.getElementById('in-user').value || "@username";
            ctx.font = "bold 28px 'Josefin Sans'";
            let uw = ctx.measureText(user).width;
            ctx.fillStyle = "#3b82f6";
            ctx.beginPath(); ctx.roundRect(70, 70, uw + 60, 64, 32); ctx.fill();
            ctx.fillStyle = "white"; ctx.fillText(user, 100, 114);

            // NAMA
            ctx.fillStyle = "#334155";
            ctx.font = "900 85px 'Josefin Sans'";
            ctx.fillText("I'M", 70, 235);
            let name = (document.getElementById('in-name').value || "Your Name");
            let endNameY = drawName(ctx, name, 210, 235, 520);

            // TTL
            ctx.fillStyle = "#94a3b8";
            ctx.font = "bold 26px 'Josefin Sans'";
            const ttl = `${document.getElementById('in-pob').value || "CITY"} • ${document.getElementById('in-dob').value || "DATE"} • AGE: ${age}`;
            ctx.fillText(ttl, 75, endNameY + 50);

            let contentTop = endNameY + 120;
            drawCover(imgObj.profile, 70, contentTop, 420, 550, 60);
            drawWrappedBio(ctx, document.getElementById('in-bio').value || "Type your bio here...", 530, contentTop + 40, 400);

            ctx.save();
            ctx.translate(760, 1250); 
            ctx.rotate(0.04);
            drawCover(imgObj.side, -180, -230, 360, 460, 50);
            ctx.restore();

            const renderList = (title, id, sy) => {
                ctx.fillStyle = "#cbd5e1";
                ctx.font = "bold 24px 'Josefin Sans'";
                ctx.fillText(title.toUpperCase(), 70, sy);
                let cx = 70, cy = sy + 50;
                const items = document.getElementById(id).value.split(',').slice(0, 10);
                items.forEach(item => {
                    if(!item.trim()) return;
                    ctx.font = "bold 22px 'Josefin Sans'";
                    let tw = ctx.measureText(item.trim()).width;
                    ctx.strokeStyle = "#cbd5e1";
                    ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.roundRect(cx, cy, tw + 50, 65, 32); ctx.stroke();
                    ctx.fillStyle = "#1e293b"; ctx.fillText(item.trim(), cx + 25, cy + 42);
                    cx += tw + 80; if(cx > 550) { cx = 70; cy += 90; }
                });
                return cy + 120;
            };

            renderList("Interests", "in-int", contentTop + 620);

            ctx.fillStyle = "#cbd5e1"; ctx.font = "bold 22px 'Josefin Sans'";
            ctx.fillText("EARFULTIME // FRIENDSHIP CARD", 70, 1550);
        }

        function download() {
            const user = document.getElementById('in-user').value || "guest";
            const link = document.createElement('a');
            link.download = `earfultime-${user}-hd.png`;
            // Gunakan 1.0 untuk kualitas PNG maksimal
            link.href = canvas.toDataURL('image/png', 1.0);
            link.click();
        }
        draw();
    </script>
</body>
</html>
