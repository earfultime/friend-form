<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>earfultime Friendship Application</title>

<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans&family=Playpen+Sans&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
:root{
  --blue:#8fa9b7;
  --brown:#5a3b22;
  --cream:#f4f0ed;
  --line:#d9cec6;
}

*{box-sizing:border-box}

html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  font-family:'Josefin Sans';
  background:var(--blue);
}

/* SLIDE */
.slide{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:16px;
}

/* FORM */
.form-box{
  width:100%;
  max-width:520px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

input,textarea{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid var(--line);
}

textarea{height:70px}

/* STATUS */
.status-group{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
}

.status-item{
  padding:8px;
  border-radius:999px;
  text-align:center;
  cursor:pointer;
  border:1px solid rgba(0,0,0,.1);
  font-size:12px;
}

.status-item.active{
  background:var(--brown);
  color:#fff;
}

/* BUTTON */
.actions{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.btn{
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.btn-primary{background:#6d8fa3;color:white}
.btn-secondary{background:#ddd}

/* PREVIEW */
#previewSlide{
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

/* WRAPPER (FIT SCREEN, GAK OVER) */
.preview-wrapper{
  width:min(90vw, 90vh);
  aspect-ratio:1/1;
  background:var(--blue);
  border-radius:28px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:14px;
}

/* CARD */
.canvas{
  width:100%;
  height:100%;
  background:var(--cream);
  border-radius:22px;
  padding:18px;
  display:flex;
  flex-direction:column;
}

/* TITLE */
.title{
  text-align:center;
  font-family:'Playpen Sans';
  color:var(--brown);
  font-size:20px;
  margin-bottom:10px;
}

/* GRID */
.layout{
  display:grid;
  grid-template-columns:140px 1fr;
  gap:12px;
}

/* PHOTO */
.photo{
  width:100%;
  aspect-ratio:3/4;
  border-radius:12px;
  border:2px dashed var(--brown);
  overflow:hidden;
}

.photo img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* FIELD */
.field{
  border-bottom:1px solid var(--line);
  padding:4px;
  font-size:12px;
}

.row{display:flex;gap:8px}

/* SECTION */
.section{margin-top:8px}

.section-title{
  font-size:11px;
  background:var(--brown);
  color:white;
  padding:4px 10px;
  border-radius:10px;
  display:inline-block;
  margin-bottom:4px;
}

/* STATUS BADGE */
.status-badge{
  padding:3px 10px;
  border-radius:999px;
  background:var(--brown);
  color:#fff;
  font-size:11px;
}

/* BUTTON AREA */
.preview-actions{
  width:min(90vw, 90vh);
  margin-top:14px;
  display:flex;
  gap:10px;
}
</style>
</head>

<body>

<!-- FORM -->
<div id="formSlide" class="slide">
  <div class="form-box">

    <input type="file" id="photoInput">
    <input id="name" placeholder="Name">
    <input id="age" placeholder="Age">
    <input id="pronouns" placeholder="Pronouns">
    <input id="mbti" placeholder="MBTI">
    <input id="dob" placeholder="Date of Birth">
    <input id="pob" placeholder="Place of Birth">
    <textarea id="hobbies" placeholder="Hobbies"></textarea>
    <textarea id="about" placeholder="About You"></textarea>

    <div class="status-group">
      <div class="status-item">Single</div>
      <div class="status-item">Taken</div>
      <div class="status-item">Married</div>
      <div class="status-item">Engaged</div>
      <div class="status-item">Non committal</div>
      <div class="status-item">earfultimecommittal</div>
    </div>

    <div class="actions">
      <button class="btn btn-primary" onclick="next()">Preview</button>
    </div>

  </div>
</div>

<!-- PREVIEW -->
<div id="previewSlide" class="slide">

<div id="captureArea" class="preview-wrapper">
  <div class="canvas">

    <div class="title">earfultime Friendship Application</div>

    <div class="layout">
      <div class="photo" id="photoBox"></div>

      <div>
        <div class="field">Name: <span id="vName">-</span></div>

        <div class="row">
          <div class="field">Age: <span id="vAge">-</span></div>
          <div class="field">MBTI: <span id="vMbti">-</span></div>
        </div>

        <div class="field">Pronouns: <span id="vPronouns">-</span></div>
        <div class="field">DOB: <span id="vDob">-</span></div>
        <div class="field">POB: <span id="vPob">-</span></div>

        <div class="field">
          Status: <span id="vStatus" class="status-badge">-</span>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Hobbies</div>
      <div class="field" id="vHobbies">-</div>
    </div>

    <div class="section">
      <div class="section-title">About You</div>
      <div class="field" id="vAbout">-</div>
    </div>

  </div>
</div>

<div class="preview-actions">
  <button class="btn btn-secondary" onclick="back()">Back</button>
  <button class="btn btn-primary" onclick="download()">Download</button>
</div>

</div>

<script>
let imgData="";
let selectedStatus="";

document.querySelectorAll('.status-item').forEach(item=>{
  item.onclick=()=>{
    document.querySelectorAll('.status-item').forEach(i=>i.classList.remove('active'));
    item.classList.add('active');
    selectedStatus=item.innerText;
  }
});

document.getElementById("photoInput").onchange=e=>{
  const file=e.target.files[0];
  const reader=new FileReader();
  reader.onload=()=>imgData=reader.result;
  if(file) reader.readAsDataURL(file);
};

function next(){
  document.getElementById("formSlide").style.display="none";
  document.getElementById("previewSlide").style.display="flex";

  document.getElementById("photoBox").innerHTML =
    imgData ? `<img src="${imgData}">` : '';

  const get = id => document.getElementById(id).value || "-";

  document.getElementById("vName").innerText = get("name");
  document.getElementById("vAge").innerText = get("age");
  document.getElementById("vMbti").innerText = get("mbti");
  document.getElementById("vPronouns").innerText = get("pronouns");
  document.getElementById("vDob").innerText = get("dob");
  document.getElementById("vPob").innerText = get("pob");
  document.getElementById("vHobbies").innerText = get("hobbies");
  document.getElementById("vAbout").innerText = get("about");

  document.getElementById("vStatus").innerText = selectedStatus || "-";
}

function back(){
  document.getElementById("previewSlide").style.display="none";
  document.getElementById("formSlide").style.display="flex";
}

function download(){
  html2canvas(document.getElementById('captureArea'),{
    scale:2,
    useCORS:true
  }).then(canvas=>{
    const link=document.createElement('a');
    link.download='earfultime.png';
    link.href=canvas.toDataURL();
    link.click();
  });
}
</script>

</body>
</html>
